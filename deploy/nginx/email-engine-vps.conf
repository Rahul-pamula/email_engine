# ============================================================
# Email Engine — VPS Nginx Config (Tracking Proxy)
# Deploy to: /etc/nginx/sites-available/email-engine
# Then: sudo ln -s /etc/nginx/sites-available/email-engine /etc/nginx/sites-enabled/email-engine
#
# Replace yourdomain.com with your actual domain.
# ============================================================

server {
    listen 80;
    server_name yourdomain.com;

    # ── Tracking pixel & click redirect ──────────────────────────────
    # These are the only paths that need to reach your local API.
    # The SSH reverse tunnel (scripts/start_tunnel.sh) makes port 8000
    # available on localhost of this VPS.
    location /track/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Don't buffer: pixel responses are tiny
        proxy_buffering    off;

        # Timeouts — fast endpoints, keep these tight
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # ── Health check (optional — handy for uptime monitors) ──────────
    location /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block everything else (API not exposed directly) ─────────────
    location / {
        return 404;
    }
}

# ── HTTPS block added automatically by certbot ────────────────────────
# Run: sudo certbot --nginx -d yourdomain.com
# Certbot will append the SSL server block and redirect HTTP → HTTPS.
