    <script>
        const phasesData = [{"title": "PHASE 0 \u2014 UI/UX Foundation and Design System", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SETUP]</span> shadcn/ui installed and initialized", "done": false, "desc": "The shadcn/ui component library is added to the project \u2014 it provides accessible, customizable UI primitives like buttons, dialogs, and inputs."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SETUP]</span> Inter font installed in root layout", "done": true, "desc": "Google's Inter typeface is loaded globally, giving the entire app a modern, clean, and highly-legible text style."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DESIGN TOKENS]</span> Core dark-mode tokens exist in globals.css", "done": true, "desc": "CSS variables for the dark-mode color palette (backgrounds, borders, text, accents) are defined once in globals.css so every component can reference them."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DESIGN TOKENS]</span> Typography scale is fully defined", "done": false, "desc": "Font sizes, weights, and line heights form a consistent scale \u2014 headings, body text, and captions all feel visually harmonious."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DESIGN TOKENS]</span> Semantic token set is complete", "done": false, "desc": "Every color token has a meaningful name (e.g. --color-surface, --color-text-muted) so teams talk about intent, not raw HEX codes."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DESIGN TOKENS]</span> App no longer uses hardcoded colors or inline style-heavy UI", "done": false, "desc": "No component directly writes #1a1a2e or style={{ color: 'red' }} \u2014 all colors go through the token system, making theme changes instant."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DESIGN TOKENS]</span> Design Tokens Documentation Page (internal token reference)", "done": false, "desc": "A living reference page inside the app lists every token name, CSS variable, and its visual output \u2014 prevents developers from re-inventing decisions."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[UX]</span> Loading skeletons on all list pages (contacts, campaigns, templates)", "done": false, "desc": "While data is being fetched, a pulsing placeholder layout appears instead of a blank screen \u2014 improves perceived performance significantly."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[UX]</span> Dark / Light mode toggle (CSS variable swap)", "done": false, "desc": "A toggle switches the entire app between dark and light themes by swapping the root CSS variable values \u2014 no components need to change."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> Button.tsx", "done": true, "desc": "A shared Button component with consistent sizing, colors, loading state, and disabled state \u2014 used everywhere so buttons always look the same."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> Badge.tsx", "done": true, "desc": "A small inline label component for status indicators like 'Active', 'Paused', 'Draft' \u2014 color-coded and reusable."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> HealthDot.tsx", "done": true, "desc": "A tiny colored dot that signals system health at a glance \u2014 green for healthy, yellow for degraded, red for down."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> LoadingSpinner.tsx", "done": true, "desc": "An animated spinner shown during async operations \u2014 ensures users always have feedback that work is in progress."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> StatCard.tsx", "done": true, "desc": "A card component that displays a single metric (e.g. 'Total Sent: 12,450') with an icon, a number, and a trend indicator."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> StatusBadge.tsx", "done": true, "desc": "A badge specifically designed for status values \u2014 maps status strings to distinct color themes automatically."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> ConfirmModal.tsx", "done": true, "desc": "A confirmation dialog that asks the user to explicitly approve dangerous actions like 'Delete 1,000 contacts' before proceeding."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> Toast.tsx", "done": true, "desc": "A small pop-up notification (top-right corner) for showing success, error, or info messages after async operations complete."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> PageHeader.tsx", "done": true, "desc": "A consistent header block shown at the top of every page \u2014 includes the page title, breadcrumb, and an optional action button."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> DataTable.tsx", "done": true, "desc": "A reusable sortable, paginated table component with column definitions \u2014 contacts list, campaigns list, and templates all use this."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> EmptyState.tsx", "done": true, "desc": "A friendly illustration + message shown when a list has zero items \u2014 replaces blank white space with a clear call-to-action."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> Breadcrumb.tsx", "done": true, "desc": "A trail of links (e.g. Campaigns \u203a Test Campaign \u203a Analytics) that shows the user where they are inside the app hierarchy."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[REUSABLE COMPONENTS]</span> src/components/ui/index.ts", "done": true, "desc": "A barrel export file \u2014 lets you write `import { Button, Badge } from '@/components/ui'` instead of separate import lines per component."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[TAILWIND BRIDGE]</span> Tailwind config maps tokens to utility names", "done": true, "desc": "The tailwind.config.ts file bridges CSS variables to Tailwind class names so you can write `text-accent` and it resolves to the correct CSS variable."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[TAILWIND BRIDGE]</span> All mapped Tailwind token names resolve to actual CSS variables", "done": false, "desc": "A verification check: every Tailwind utility added in the config actually has a corresponding CSS variable in globals.css \u2014 no dangling references."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[UX RULES]</span> Every destructive action uses ConfirmModal", "done": false, "desc": "Any button that deletes or permanently modifies data is blocked behind a ConfirmModal \u2014 prevents accidental data loss."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[UX RULES]</span> Every async form submit uses loading state consistently", "done": false, "desc": "When a form is submitted, its button shows a spinner and disables itself \u2014 prevents double-submissions and communicates that work is happening."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[UX RULES]</span> Every API success path uses toast feedback consistently", "done": false, "desc": "After a successful API call, a green toast appears \u2014 users always know their action was saved."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[UX RULES]</span> Every API error path uses toast feedback consistently", "done": false, "desc": "When an API call fails, a red toast appears with a short message \u2014 users never see a blank failure silently."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[UX RULES]</span> Every empty list uses EmptyState", "done": false, "desc": "All list pages (contacts, campaigns, templates) show the EmptyState component instead of a blank div when there is no data."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[UX RULES]</span> Every list page has consistent search and filter behavior", "done": false, "desc": "Search boxes, filter dropdowns, and pagination behave identically across all list pages \u2014 users only learn the pattern once."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[UX RULES]</span> Mobile navigation is complete end-to-end", "done": false, "desc": "The sidebar collapses into a hamburger menu on small screens, all pages are scrollable, and no UI is clipped or hidden on mobile."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[ACCESSIBILITY]</span> Remove global *:focus { outline: none }", "done": false, "desc": "Removing this rule restores visible keyboard focus indicators \u2014 a critical accessibility requirement for users navigating by keyboard."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[ACCESSIBILITY]</span> Modal accessibility is complete (focus trap + restore)", "done": false, "desc": "When a modal opens, keyboard focus is trapped inside it; when it closes, focus returns to the triggering element \u2014 standard a11y behavior."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[ACCESSIBILITY]</span> Icon-only buttons are fully labeled app-wide", "done": false, "desc": "Every button that shows only an icon has an aria-label attribute so screen readers can announce its purpose."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[ACCESSIBILITY]</span> 44x44 touch-target guidance is satisfied app-wide", "done": false, "desc": "All interactive elements are at least 44\u00d744 CSS pixels in size \u2014 Apple/Google accessibility guideline to prevent mis-taps on mobile."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[LOCAL DEV SETUP]</span> Mailhog added to docker-compose.yml", "done": false, "desc": "Mailhog is a local email catcher \u2014 emails sent during local development go to a web UI instead of real inboxes, which is safe and observable."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[LOCAL DEV SETUP]</span> scripts/seed_dev_data.py added", "done": false, "desc": "A script that populates the local database with realistic sample data (tenants, contacts, campaigns) so developers can test the UI without real data."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[LOCAL DEV SETUP]</span> .env.example fully documents all required variables", "done": false, "desc": "A complete template of all environment variables with comments explaining where to get each value \u2014 so new developers can set up the project without asking anyone."}]}, {"title": "PHASE 1 \u2014 Foundation, Auth, Tenant Identity, and Onboarding", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Custom email/password auth (bcrypt + custom JWT)", "done": true, "desc": "Passwords are hashed with bcrypt before storage. After login, a signed JWT token is issued \u2014 the token is required for every protected API call."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Tenant membership model (users, tenants, tenant_users)", "done": true, "desc": "Three linked tables: users (who you are), tenants (your workspace), and tenant_users (your role in that workspace). One user can have multiple workspaces."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Onboarding flow (4-step wizard + progressive endpoints)", "done": true, "desc": "New tenants go through a wizard (workspace name \u2192 use-case \u2192 integrations \u2192 scale) before seeing the full dashboard \u2014 ensures every account is properly configured."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> JWT middleware (tenant_id, role, email, user_id verification)", "done": true, "desc": "Every API request passes through middleware that verifies the JWT, extracts tenant_id/role/user_id, and injects them into the request context for all route handlers."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Active-tenant guard exists", "done": true, "desc": "A middleware check blocks API calls from tenants whose account is suspended or still in the onboarding state."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Workspace switching exists", "done": true, "desc": "A user who belongs to multiple workspaces can switch between them \u2014 the JWT is re-issued for the selected workspace."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> /auth/me fully implemented", "done": false, "desc": "The GET /auth/me endpoint returns the full profile of the currently logged-in user \u2014 name, email, role, plan, and workspace details."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> All onboarding endpoints use JWT-only tenant resolution consistently", "done": false, "desc": "No onboarding route reads tenant_id from the request body or query string \u2014 it always comes from the verified JWT, preventing spoofing."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Login page", "done": true, "desc": "The frontend login screen with email/password fields, error messaging, and a link to sign up or reset password."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Signup page", "done": true, "desc": "The registration screen where new users create their account \u2014 collects name, email, and password, then triggers email verification."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> reCAPTCHA on Signup form", "done": false, "desc": "Google reCAPTCHA is added to the signup form to block automated bot registrations."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Onboarding wizard (workspace > use-case > integrations > scale > complete)", "done": true, "desc": "The multi-step setup flow shown to new tenants \u2014 it collects workspace name, intended email use case, connected integrations, and expected volume."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Interactive onboarding checklist on dashboard", "done": true, "desc": "The dashboard shows a setup checklist (verify email, add a sender domain, create first campaign) that disappears once all steps are complete."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Sidebar navigation layout", "done": true, "desc": "The left-side navigation bar with links to Contacts, Campaigns, Templates, Analytics, Settings \u2014 collapses on mobile."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Auth context exists", "done": true, "desc": "A React context that stores the current user's session (token, role, tenant_id) and provides it to any component via a hook."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Middleware redirects exist", "done": true, "desc": "Next.js route middleware that checks the JWT/session cookie and redirects unauthenticated users to the login page automatically."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Route protection is fully centralized and consistent", "done": false, "desc": "Every protected page uses the same single middleware check \u2014 no page accidentally forgets to protect itself."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY]</span> JWT carries tenant identity", "done": true, "desc": "The JWT payload includes tenant_id so every API call automatically carries workspace context without an extra database lookup."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY]</span> X-Tenant-ID is validated against JWT when used", "done": true, "desc": "If a request sends an X-Tenant-ID header, the server verifies it matches the tenant_id inside the JWT \u2014 prevents tenants from accessing other users' data."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY]</span> Onboarding tenants are blocked from active-tenant routes", "done": true, "desc": "A guard prevents a tenant still in the onboarding wizard from calling production API endpoints like 'send campaign'."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY]</span> Social Auth (Google, GitHub) via OAuth 2.0 / Supabase", "done": true, "desc": "Users can sign in with their Google or GitHub account instead of creating a password \u2014 handled via Supabase's OAuth integration."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY]</span> Rate limiting on login + registration endpoints (per IP, per email)", "done": false, "desc": "Login and signup are limited to 10 attempts per minute per IP/email \u2014 prevents brute-force password attacks."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY]</span> Email verification required before onboarding completes", "done": false, "desc": "A user must click the verification link in their email before the onboarding wizard can advance past step 1."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY]</span> Short-lived access tokens (15-30 min) + silent refresh tokens", "done": false, "desc": "Access tokens expire quickly so stolen tokens have a short window. Refresh tokens automatically issue new access tokens in the background."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY]</span> Token revocation via token_version counter (force-logout all devices)", "done": false, "desc": "A counter on each user row is incremented to invalidate all existing JWTs instantly \u2014 useful for 'sign out everywhere' or account compromise scenarios."}]}, {"title": "PHASE 1.5 \u2014 Auth Hardening & Audit Logging", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Remove custom /auth/forgot-password endpoint", "done": true, "desc": "The hand-rolled forgot-password route was replaced by Supabase Auth's built-in email flow, which handles token generation and expiry securely."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Remove custom /auth/reset-password endpoint", "done": true, "desc": "Same as above \u2014 the custom password-reset handler was removed in favor of Supabase Auth's standard reset flow."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> reCAPTCHA token verification endpoint/middleware", "done": false, "desc": "Backend middleware that validates the reCAPTCHA token sent from the signup form \u2014 prevents bots from auto-creating accounts."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Audit logs table (who did what, when, on which record \u2014 metadata only)", "done": true, "desc": "A database table that records every important action (who deleted contacts, who sent a campaign) \u2014 stores metadata only, never actual email content."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Audit log table is write-only / immutable (no UPDATE or DELETE allowed)", "done": false, "desc": "Once a log row is written, it can never be changed or deleted \u2014 even by admins \u2014 making it a tamper-proof activity record."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Log severity levels: INFO / WARNING / CRITICAL on every log row", "done": false, "desc": "Each audit log entry has a severity tag: INFO for normal events, WARNING for unusual ones, CRITICAL for high-risk actions like bulk deletes."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Auto-alert on CRITICAL log events (bulk delete >1000, suspicious login)", "done": false, "desc": "When a CRITICAL event occurs, the system automatically emails the workspace owner \u2014 e.g. 'Someone deleted 2,000 contacts from your account'."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Configure Supabase Auth SMTP to use shrmail.app@gmail.com", "done": true, "desc": "Supabase's auth emails (verification, password reset) are routed through your own Gmail account instead of Supabase's generic sender."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Fix forgot-password page \u2014 Supabase Auth built-in reset email flow", "done": true, "desc": "The frontend forgot-password page now calls Supabase Auth's built-in reset endpoint instead of a custom one."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Fix reset-password page \u2014 Supabase Auth password update", "done": true, "desc": "The reset-password page uses Supabase Auth's updateUser() call to change the password after the reset link is clicked."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Test: sign up > verify email > login > forgot password > reset", "done": true, "desc": "An end-to-end manual test confirming the full auth lifecycle works: create account, verify email, log in, reset password."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Audit log viewer with severity filter (INFO / WARNING / CRITICAL)", "done": true, "desc": "A page in the admin settings that shows the audit log timeline with filter buttons for severity level."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY]</span> MFA via TOTP for workspace admins", "done": false, "desc": "Workspace admins can enable time-based one-time passwords (Google Authenticator style) as a second login factor."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 1]</span> Cross-tenant webhook suppression \u2014 add tenant_id filter to _suppress_contact() in webhooks.py (0.5d)", "done": false, "desc": "Critical bug: when AWS SES reports a bounce, the code suppresses that email address across ALL tenants on the platform. Fix: add a tenant_id filter so only the correct workspace's contact is suppressed."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 2]</span> JWT refresh token model \u2014 30-min access token + HttpOnly refresh cookie + token_version revocation on users table (2d)", "done": false, "desc": "Security fix: current JWTs are valid for 7 days and cannot be revoked. Fix: shorten to 30 minutes, add a long-lived refresh token in an HttpOnly cookie, and allow instant revocation via a token_version column."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 3]</span> Lock CORS to FRONTEND_URL env var \u2014 no wildcard in production (0.5d)", "done": false, "desc": "Security fix: the API currently allows requests from any website (CORS wildcard). Fix: restrict it to only your frontend domain by reading FRONTEND_URL from the environment."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 4]</span> Enable SSL cert verification in worker \u2014 remove ssl.CERT_NONE; add AMQP_SKIP_TLS_VERIFY dev flag (0.5d)", "done": false, "desc": "Security fix: the email worker disables SSL certificate checking, which allows man-in-the-middle attacks. Fix: enable cert verification and add a dev-only env flag to skip it locally."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 5]</span> Delete /contacts/upload + /test-send from main.py; remove db_check.py, db_check2.py, generate_test_csv.py from repo root (0.5d)", "done": false, "desc": "Cleanup: two scaffolding endpoints bypass security checks and should be removed from the production API. Also remove dev scripts committed to the repo root."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 6]</span> Remove duplicate events router registration \u2014 second app.include_router(events_router.router) in main.py (0.5d)", "done": false, "desc": "Bug fix: the events router is registered twice in main.py. While harmless at runtime, it doubles the routes in the API docs and is a maintenance hazard."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRIEND AUDIT FIX 17]</span> OAuth State Parameter \u2014 Require and validate a random state string in the Google/GitHub OAuth flow to prevent CSRF (0.5d)", "done": false, "desc": "Security fix: the Google/GitHub login flow is missing a state parameter. Without it, an attacker can trick users into logging in under the attacker's account (OAuth CSRF). Fix: generate and validate a random state string on each login attempt."}]}, {"title": "PHASE 1.6 \u2014 GDPR & Legal Compliance", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Data export API (async job \u2014 POST > job_id > poll > download ZIP)", "done": false, "desc": "Tenants can request a full data export. It runs as a background job and returns a download link once ready \u2014 avoids timeouts on large datasets."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Right to be forgotten: DELETE /contacts/{id}/anonymize (anonymize PII, keep row)", "done": false, "desc": "GDPR requirement: anonymize a contact's personal data (name, email) but keep the row for statistical integrity \u2014 the data is pseudonymized, not deleted."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Soft delete pattern: deleted_at on contacts, campaigns, templates (30-day restore)", "done": false, "desc": "Instead of permanently removing records, mark them with a deleted_at timestamp. They disappear from the UI but can be restored within 30 days."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Consent tracking: consent_source, consent_date, consent_ip on contacts", "done": false, "desc": "Each contact records how and when they gave consent to receive emails \u2014 essential for GDPR audits and CAN-SPAM compliance."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Data retention policy: auto-flag contacts inactive >24 months for purge", "done": false, "desc": "Contacts who haven't engaged in over 2 years are automatically flagged for review \u2014 keeping the list clean and compliant with data minimization rules."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Consent re-validation: exclude contacts with consent >24 months old", "done": false, "desc": "Campaigns automatically skip contacts whose consent is older than 24 months \u2014 prevents emailing people who haven't opted in recently."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Do Not Contact (DNC) global suppression list (platform-level, blocks all emails)", "done": false, "desc": "A platform-level list (not per-tenant) of email addresses that can never receive emails from any tenant \u2014 e.g. addresses that have reported legal complaints."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Restore modal for soft-deleted items", "done": false, "desc": "A UI element that lets users un-delete a contact, campaign, or template within the 30-day recovery window."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Data export button in Settings", "done": false, "desc": "A button on the Settings page that triggers the async data export job for the current tenant."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Consent column visible in contacts table", "done": false, "desc": "The contacts list shows each contact's consent source and date so operators can audit consent at a glance."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Privacy policy / Terms page linked from footer", "done": false, "desc": "The application footer contains links to the Privacy Policy and Terms of Service \u2014 required for legal compliance and user trust."}]}, {"title": "PHASE 2 \u2014 Contacts Engine", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> CSV/XLSX ingestion", "done": true, "desc": "Tenants can upload a CSV or Excel file of contacts. The file is parsed and each row is inserted into the contacts table for the current tenant."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Real-time contact ingestion API (POST /v1/contacts for forms/CRM webhooks)", "done": false, "desc": "An API endpoint that accepts individual contact records in real time \u2014 used by web forms, CRMs, or any external system to add contacts programmatically."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Email validation: syntax check + MX record check + disposable email detection", "done": false, "desc": "Each email is validated at three levels: correct format, the domain actually has a mail server, and the domain isn't a known disposable-email provider."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Contact scoring system (engaged / at-risk / inactive / risky)", "done": false, "desc": "Each contact is automatically scored based on their engagement history \u2014 high openers are 'engaged', long-inactive contacts are 'at-risk', etc."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Upload preview endpoint", "done": true, "desc": "Before committing a CSV import, an endpoint parses the file and returns a preview of the first few rows and the detected columns for the user to review."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Async import job creation", "done": true, "desc": "After the user confirms the column mapping, an import job record is created in the database and handed off to the background worker \u2014 the API returns immediately."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> RabbitMQ background import worker", "done": true, "desc": "A background process consumes import jobs from the queue and processes each CSV row \u2014 deduplicates contacts and inserts them in batches."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Import batch history", "done": true, "desc": "Every CSV upload creates a 'batch' record with stats (total rows, imported, duplicates, errors) so tenants can review past imports."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Deduplication (in-memory + Supabase upsert on tenant_id, email)", "done": true, "desc": "Contacts are deduplicated both in memory (within the file) and at the database level using an upsert \u2014 the same email address is never inserted twice per tenant."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Contact status (subscribed, unsubscribed, bounced, complained)", "done": true, "desc": "Each contact has an explicit status that controls whether emails are sent to them. Bounced and complained contacts are automatically excluded from campaigns."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Domain summary endpoint and email_domain storage", "done": true, "desc": "Each contact's email domain is extracted and stored separately. An endpoint returns a summary of contacts grouped by domain (e.g. 450 @gmail.com, 200 @yahoo.com)."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Batch-scoped domain filtering", "done": true, "desc": "When selecting a campaign audience, tenants can filter contacts to a specific domain within a specific import batch."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Segmentation filters (filter by field/operator/value)", "done": false, "desc": "Contacts can be filtered by any field (e.g. status = subscribed, country = India) to build targeted audience segments for campaigns."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Bulk delete", "done": true, "desc": "Tenants can select and delete multiple contacts at once \u2014 either selected rows or an entire batch."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Contact search endpoint (email, name, tag)", "done": false, "desc": "A search endpoint that queries contacts by email address, name, or tag \u2014 used by the search box on the contacts list page."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Contact update endpoint (email + custom fields)", "done": true, "desc": "An endpoint that updates a contact's email address or custom field values."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Tags CRUD API (add/remove/list tags per contact)", "done": false, "desc": "Contacts can be tagged with labels (e.g. 'VIP', 'newsletter'). This API manages creating, assigning, removing, and listing tags."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Soft delete: deleted_at column on contacts (restore within 30 days)", "done": false, "desc": "When a contact is deleted, it's marked with a timestamp rather than removed \u2014 it can be restored within 30 days."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Suppression list API (GET /contacts/suppression)", "done": true, "desc": "An endpoint that returns all suppressed contacts (bounced, unsubscribed, complained) for the current tenant \u2014 used on the Suppression List page."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Export contacts API", "done": true, "desc": "An API that generates a CSV download of all contacts for the current tenant \u2014 useful for backups or migrations."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> FIX: GET /suppression route collision with /{contact_id} resolved", "done": true, "desc": "Bug fix: the /contacts/suppression endpoint was being matched by the /{contact_id} wildcard route, returning a 'contact not found' error. Resolved by reordering route registration."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> FIX: Suppression list jwt_payload arg bug fixed (was returning 0 results)", "done": true, "desc": "Bug fix: the suppression list endpoint was not extracting tenant_id from the JWT correctly, causing it to return zero results for all tenants."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Contacts list page (table with search and pagination)", "done": true, "desc": "The main contacts screen \u2014 a paginated table with a search bar, status filters, and bulk action buttons."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Import contacts modal with preview and mapping", "done": true, "desc": "A dialog that guides the user through uploading a CSV, previewing its contents, and mapping columns to contact fields before confirming the import."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Async import progress polling", "done": true, "desc": "After an import starts, the frontend polls an endpoint every 3 seconds to show live progress (rows processed, errors) to the user."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Import history tab", "done": true, "desc": "A tab on the Contacts page listing all past import batches \u2014 shows date, file name, row count, and import status."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Batch detail page", "done": true, "desc": "A detail page for a specific import batch \u2014 shows a breakdown of imported contacts, duplicate counts, and any row-level errors."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Batch detail domain filtering", "done": true, "desc": "On the batch detail page, contacts are grouped and filterable by email domain."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Contact status badges (subscribed / unsubscribed / bounced)", "done": true, "desc": "Colored badges in the contacts table that show the status of each contact at a glance."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Segment builder UI (filter by field, value)", "done": false, "desc": "A UI that lets tenants build audience segments by adding filter rules (field + operator + value) before launching a campaign."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Bulk action buttons (delete selected)", "done": true, "desc": "Checkboxes on the contacts table rows, plus a 'Delete Selected' button in the toolbar, for mass management."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Contact detail editing (email + custom fields)", "done": true, "desc": "Clicking on a contact opens an edit panel where the tenant can update the email address or any custom field."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Contact detail page (individual contact activity)", "done": false, "desc": "A dedicated page for a single contact showing their full activity history \u2014 emails received, opens, bounces, and unsubscribes."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Export contacts to CSV button", "done": true, "desc": "A button on the contacts page that triggers a CSV download of the current filtered contact list."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Tags UI (add/remove tags on contacts)", "done": true, "desc": "An inline UI on the contact detail view to add or remove tags from a contact."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Suppression list page (view bounced/spam/unsubscribed contacts)", "done": true, "desc": "A dedicated page that shows all suppressed contacts \u2014 helps tenants audit who won't receive emails and why."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Campaign audience selection supports batch-domain targeting", "done": true, "desc": "When creating a campaign, tenants can choose to send to all contacts from a specific imported batch or domain."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Campaign audience selection supports multi-domain selection inside a batch", "done": true, "desc": "Tenants can select multiple domains within a single batch as the campaign audience."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Duplicate resolution UI (show conflict, let tenant choose which values to keep)", "done": false, "desc": "When an imported contact already exists, a UI presents both the old and new values side-by-side and asks the tenant which to keep."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Contact scoring badge visible in contacts list", "done": false, "desc": "The contacts table shows a small scoring badge (Engaged / At-Risk / Inactive / Risky) for each contact."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRIEND AUDIT FIX 18]</span> Streaming CSV Uploads \u2014 Replace pandas in-memory parser with async chunked byte stream parsing to prevent OOM API crashes (2d)", "done": false, "desc": "Performance fix: the current CSV import reads the entire file into RAM using pandas. For large files (100k+ rows), this crashes the API. Fix: parse the CSV as a streaming byte sequence so memory usage stays constant regardless of file size."}]}, {"title": "PHASE 3 \u2014 Template Engine", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Template CRUD", "done": true, "desc": "Create, read, update, and delete email templates \u2014 the core data management API for the template engine."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Category", "done": true, "desc": "Templates can be organized by category (e.g. Newsletter, Promotional, Transactional) to make finding the right base design easier."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Persist compiled HTML from the active block editor", "done": false, "desc": "When a tenant saves a block-editor template, the compiled HTML is stored alongside the design JSON so it can be previewed and sent without re-compiling."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Preset gallery and preset-driven template creation", "done": true, "desc": "A gallery of pre-built starter templates (welcome email, newsletter, promo) that tenants can select as a starting point instead of building from scratch."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Template versioning (save history)", "done": false, "desc": "Every time a template is saved, the previous version is kept \u2014 tenants can view a timeline of changes and roll back to any earlier version."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Plain text auto-generator (sync from HTML for spam filters)", "done": false, "desc": "Automatically generates a plain-text version of the email from the HTML body \u2014 important for spam filter scores and email clients that don't render HTML."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Public View Online link (render template in browser without login)", "done": false, "desc": "A public URL is generated for each campaign that renders the email in the browser \u2014 shown as a 'View this email online' fallback link."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Templates list page (grid of template cards with thumbnails)", "done": true, "desc": "The main templates screen showing cards for each template with a visual thumbnail preview."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Create template (blank canvas and preset entry flow)", "done": true, "desc": "The UI flow for creating a new template \u2014 choose between a blank canvas or starting from a preset gallery card."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Structured block editor (rows > columns > blocks)", "done": true, "desc": "The drag-and-drop email editor where tenants compose emails by combining row containers, column layouts, and content blocks (text, image, button)."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Server-side compile preview (design_json > MJML > HTML)", "done": true, "desc": "The template JSON is sent to the server and compiled through MJML into responsive HTML \u2014 the result is shown as a live preview in the editor."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Plain Text (Auto-generated) | Plain Text (Custom) tabs", "done": false, "desc": "Two tabs in the template editor: one showing the auto-generated plain text, and one where the tenant can write a custom plain-text version."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Send test email button (enter email address > receive real email)", "done": false, "desc": "A button in the template editor that sends the current template to any entered email address so the tenant can preview it in a real inbox."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Duplicate template button", "done": false, "desc": "A button that clones an existing template into a new draft \u2014 useful for creating variations of a proven design."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Category filter tabs on template list", "done": false, "desc": "Tabs across the top of the templates list that filter templates by their category."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Version history panel (see and restore older versions)", "done": false, "desc": "A sidebar panel in the template editor that shows past saves and allows rolling back to any previous version with one click."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Dynamic placeholder guide (show list of {{merge_tags}} user can use)", "done": false, "desc": "A helper panel in the editor listing all available merge tags like {{first_name}}, {{company}}, and {{unsubscribe_link}} with copy-to-clipboard buttons."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Spam score checker (SpamAssassin-style heuristics before campaign send)", "done": false, "desc": "Analyzes the email content for common spam triggers (ALL CAPS, excessive punctuation, spammy phrases) and shows a score before the campaign is sent."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Mobile preview mode (375px viewport toggle in template editor)", "done": false, "desc": "A toggle in the template editor that renders the preview at mobile screen width (375px) to check how the email looks on phones."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Inbox preview simulation (Gmail, Outlook, Apple Mail rendering)", "done": false, "desc": "Shows how the email will render in the most popular email clients \u2014 Gmail, Outlook, and Apple Mail all have different rendering engines."}]}, {"title": "PHASE 4 \u2014 Campaign Orchestration", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Campaign CRUD", "done": true, "desc": "Create, read, update, and delete campaigns \u2014 the core data management API for the campaign engine."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Snapshot campaign content + dispatch intents at send time", "done": true, "desc": "At the moment a campaign is sent, the system takes a snapshot of the template HTML and creates one dispatch record per recipient \u2014 so later content changes don't affect an in-progress send."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Spintax + merge tags", "done": true, "desc": "Spintax ({Hello|Hi|Hey}) and merge tags ({{first_name}}) are applied per-recipient \u2014 each email looks slightly different and is personalized."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Scheduled sending", "done": true, "desc": "Campaigns can be scheduled for a future date/time. The scheduler checks for due campaigns every 60 seconds and dispatches them automatically."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Pause/resume campaign", "done": true, "desc": "A running campaign can be paused mid-send to halt delivery temporarily, then resumed \u2014 useful for catching mistakes after launch."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Cancel campaign mid-send", "done": true, "desc": "A campaign can be permanently cancelled while in progress \u2014 all remaining unsent dispatch intents are marked cancelled."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Resend to unopened contacts", "done": false, "desc": "After a campaign completes, the tenant can trigger a resend (optionally with a different subject) to contacts who never opened the original email."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> FIX: exclude_suppressed=True enforced in scheduler.py, main.py, campaigns.py", "done": true, "desc": "Bug fix: several code paths were not consistently excluding suppressed (bounced/unsubscribed) contacts when building the dispatch list. This is now enforced everywhere."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Campaigns list page (status badges, stats)", "done": true, "desc": "The main campaigns screen \u2014 a list of all campaigns with status badges (draft, scheduled, sending, sent), and quick stats (sent count, open rate)."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Create campaign wizard (details > audience > content > review)", "done": true, "desc": "A multi-step wizard for creating a campaign: fill in basic details, choose the audience, pick a template, then review before sending."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Campaign detail page", "done": true, "desc": "A page showing everything about a single campaign: its settings, current status, dispatch progress, and a link to analytics."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Pre-send checklist UI", "done": true, "desc": "Before a campaign is sent, a checklist verifies critical elements are in order: subject line entered, unsubscribe link present, audience not empty, sender domain verified."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Schedule picker (date/time input for scheduled send)", "done": true, "desc": "A date/time picker UI for setting when a scheduled campaign should be dispatched."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Pause button / Cancel button on in-progress campaign", "done": true, "desc": "Action buttons on the campaign detail page to pause or cancel a campaign that is currently sending."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Send test email modal (enter email address, preview)", "done": false, "desc": "A modal inside the campaign wizard where the tenant can send themselves a test version of the campaign before the real send."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[CAMPAIGN]</span> Automated pre-send validation (no subject / no unsub / blank body blocks send)", "done": false, "desc": "The backend automatically rejects campaign sends that are missing a subject line, unsubscribe link, or email body \u2014 catches common mistakes before they reach recipients."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[CAMPAIGN]</span> Send throttling control (configurable per-minute rate, ETA shown in UI)", "done": false, "desc": "Tenants can configure how many emails per minute are sent (e.g. 500/min for warm-up) and the UI shows an estimated completion time."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[CAMPAIGN]</span> Send to 5% sample first mode (review analytics before full broadcast)", "done": false, "desc": "An option to send the campaign to a 5% random sample of the audience first, review open/bounce rates, and then decide whether to send to the remaining 95%."}]}, {"title": "PHASE 5 \u2014 Delivery Engine", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Worker loop (RabbitMQ consumer)", "done": true, "desc": "The email worker is a long-running process that listens to a RabbitMQ queue. When a campaign is dispatched, thousands of emails are published to the queue and the worker processes them in order."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> SMTP send via Mailtrap/SES", "done": true, "desc": "The worker sends each individual email via SMTP \u2014 either through Mailtrap (in development/testing) or Amazon SES (in production)."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Dynamic SMTP TLS Handshake based on active Port (587 support)", "done": true, "desc": "The SMTP connection uses STARTTLS when connecting on port 587, and implicit TLS on port 465 \u2014 automatically detected from the port number."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Retry + dead-letter queue (nack on failure)", "done": true, "desc": "If an email fails to send (SMTP error, timeout), the worker NAcKs the RabbitMQ message, which places it in a dead-letter queue for retry or inspection."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Unsubscribe link injected into every email (HMAC-signed token)", "done": true, "desc": "The worker automatically appends a cryptographically signed unsubscribe link to every email \u2014 the signature prevents forged unsubscribes."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Physical business address in email footer (CAN-SPAM compliant)", "done": true, "desc": "A physical mailing address is injected into every email footer \u2014 required by the US CAN-SPAM Act for bulk commercial emails."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Hard bounce > auto-mark contact as bounced (SES webhook)", "done": true, "desc": "When AWS SES reports a permanent delivery failure, a webhook triggers and automatically marks that contact as 'bounced' \u2014 they won't be emailed again."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Spam complaint > auto-mark contact as unsubscribed (SES webhook)", "done": true, "desc": "When AWS SES reports that a recipient clicked 'Mark as Spam', a webhook automatically marks them as unsubscribed."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Daily send limit enforcement (per-tenant, resets at midnight, 429 on breach)", "done": true, "desc": "Each tenant has a daily email send quota. Attempts to exceed it return a 429 error. The counter resets at midnight UTC."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> All dispatch paths enforce exclude_suppressed=True", "done": true, "desc": "Every code path that builds a campaign audience (API, scheduler, bulk send) filters out suppressed contacts before dispatching \u2014 a critical correctness guarantee."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Bounce classification: hard bounce suppresses, soft bounce retries 3x", "done": false, "desc": "Permanent bounces (invalid address) immediately suppress the contact. Temporary bounces (mailbox full) are retried up to 3 times before suppression."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Domain warmup automation (graduated daily limit increase over 30 days)", "done": false, "desc": "For new sending domains, the daily limit automatically increases over 30 days following a warm-up schedule \u2014 builds sender reputation gradually."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Send reputation scoring per tenant (auto-throttle on >2% bounce/>0.1% complaint)", "done": false, "desc": "The system monitors each tenant's bounce and complaint rates. If thresholds are exceeded, sending is automatically throttled to protect domain reputation."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> FIX: Unsubscribe event logged to email_events with correct tenant_id", "done": true, "desc": "Bug fix: unsubscribe events were being logged without a tenant_id, making them invisible in per-tenant analytics."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> FIX: Re-subscribe sets status to 'subscribed' (was 'active')", "done": true, "desc": "Bug fix: the re-subscribe endpoint was setting status to 'active' instead of the correct value 'subscribed', causing filtering inconsistencies."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> FIX: Re-subscribe API uses NEXT_PUBLIC_API_URL (CORS resolved)", "done": true, "desc": "Bug fix: the re-subscribe endpoint was being called from the browser with a server-side URL, causing CORS errors. Fixed to use the public API URL."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> /unsubscribe as a public route (no sidebar/header)", "done": true, "desc": "The unsubscribe page is fully public and rendered without the app navigation \u2014 so recipients who aren't logged in can still unsubscribe."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Unsubscribe page: auto-close tab after 3 seconds + Close Window button", "done": true, "desc": "After a successful unsubscribe, the browser tab automatically closes after 3 seconds, and a 'Close Window' button is shown as a fallback."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Re-subscribe option on unsubscribe page", "done": true, "desc": "After unsubscribing, a button lets the contact change their mind and re-subscribe immediately."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Re-subscribe page: auto-close tab after 3 seconds + Close Window button", "done": true, "desc": "After re-subscribing, the tab auto-closes in 3 seconds with a 'Close Window' fallback button."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 7]</span> Soft vs hard bounce classification \u2014 parse SES bounceType (Permanent/Transient/Undetermined) before suppressing (2d)", "done": false, "desc": "Bug fix: all SES bounces currently suppress the contact regardless of type. AWS SES returns a bounceType (Permanent/Transient/Undetermined). Fix: only permanently suppress on Permanent/hard bounces; retry Transient ones."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 8]</span> Real rolling bounce rate writer \u2014 write tenant:{id}:bounces:rolling to Redis after each bounce; circuit breaker then actually fires (1.5d)", "done": false, "desc": "Bug fix: the bounce-rate circuit breaker checks a Redis key that is never actually written. Fix: write the rolling bounce count to Redis after every confirmed bounce so the circuit breaker actually receives real data."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 9]</span> Move scheduler to standalone worker/scheduler.py \u2014 Redis SET NX EX 90 distributed lock, 60s poll, remove from FastAPI lifespan (2d)", "done": false, "desc": "Architecture fix: the campaign scheduler runs inside the API process, so running two API replicas would double-schedule campaigns. Fix: extract it to a standalone worker process protected by a Redis distributed lock."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRIEND AUDIT FIX 19]</span> Batch DB Updates in Worker \u2014 Refactor email_sender.py to batch dispatch row updates via RPC instead of 1-by-1 HTTP calls (2d)", "done": false, "desc": "Performance fix: for a 100,000-recipient campaign, the worker currently makes 100,000 individual HTTP requests to update row statuses. Fix: batch these into groups of 500 using a Postgres stored procedure, reducing HTTP calls by 99.5%."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRIEND AUDIT FIX 20]</span> Native DB Connection \u2014 Switch worker from Supabase PostgREST HTTP client to asyncpg TCP connection pool (1.5d)", "done": false, "desc": "Performance fix: the worker talks to Postgres via Supabase's REST API (HTTP). Fix: switch to asyncpg, which connects directly to Postgres over TCP \u2014 eliminating REST overhead and enabling connection pooling."}]}, {"title": "PHASE 6 \u2014 Observability & Analytics", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Open tracking pixel endpoint (HMAC-signed) via Supabase Edge Function", "done": true, "desc": "A 1\u00d71 transparent pixel image is embedded in every email. When a recipient opens the email, their client loads the pixel, logging the open event. The URL is signed with HMAC to prevent forging."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Click tracking intentionally disabled (cost optimization)", "done": true, "desc": "Click tracking was evaluated but disabled \u2014 it requires redirecting every link through the tracking server, adding hosting cost and latency."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> SES bounce/complaint webhooks captured natively (bypass Edge Functions)", "done": true, "desc": "AWS SES bounce and complaint notifications are sent directly to the FastAPI backend endpoint \u2014 no Supabase Edge Function in the middle, reducing latency."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Stats aggregation (sent, opens, bounces, unsubscribes per campaign)", "done": true, "desc": "For each campaign, the analytics API returns aggregated counts of sent, unique opens, total opens, bounces, and unsubscribes."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Source attribution (gmail_proxy, apple_mpp, outlook, yahoo, scanner, human)", "done": true, "desc": "Open events are classified by their source \u2014 Apple Mail Privacy Protection (MPP), Gmail image proxy, Outlook, or a likely human open \u2014 to filter out bot/proxy inflated metrics."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> FIX: Unsubscribes count cross-checks live contact status (re-subscriptions drop count)", "done": true, "desc": "Bug fix: the unsubscribe count in analytics incorrectly remained high even after a contact re-subscribed. Fixed to re-check live contact status when computing the count."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Contact activity log (recipient timeline in analytics API)", "done": true, "desc": "An analytics endpoint that returns the full event timeline for a specific contact in a campaign \u2014 when the email was sent, opened, if they bounced, etc."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Optional per-campaign click tracking (opt-in, stored in email_events)", "done": false, "desc": "Click tracking can be optionally enabled per campaign \u2014 each link is wrapped in a tracking URL and clicks are stored in the email_events table."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> CTR stat card when click tracking enabled (unique clicks / unique opens)", "done": false, "desc": "When click tracking is enabled for a campaign, a 'Click-Through Rate' stat card appears on the analytics page."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Engagement over time graph (opens/bounces/unsubs by hour, first 72h)", "done": false, "desc": "A time-series chart showing how opens, bounces, and unsubscribes arrived over the first 72 hours after a campaign was sent."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Campaign analytics page (Sent, Opens Unique, Opens Total, Bounces, Unsubscribes)", "done": true, "desc": "The main analytics screen for a campaign \u2014 shows all key engagement metrics in stat cards at the top."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> FIX: Recipient Activity 'Unsubscribed' column reflects live contact status", "done": true, "desc": "Bug fix: the recipient activity table showed 'Unsubscribed' based on the event log rather than the current contact status, causing stale data after re-subscribes."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Proxy/Scanner breakdown panel (Gmail, Apple MPP, Outlook, Yahoo, Human)", "done": true, "desc": "A panel on the analytics page showing what percentage of opens came from each source type \u2014 helps tenants understand how many opens are real vs automated."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> FIX: Human-filtered toggle removed \u2014 all signals shown natively", "done": true, "desc": "UX decision: removed the 'human only' toggle and instead show all open signals with source attribution, letting users see the full picture without filtering."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Dashboard homepage sender health widget", "done": true, "desc": "A widget on the main dashboard showing the current sender health score (bounce rate %, complaint rate %) and whether the domain is in good standing."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Export analytics as CSV / PDF summary", "done": false, "desc": "A button on the analytics page to download campaign stats as a CSV or a formatted PDF report."}]}, {"title": "PHASE 7 \u2014 Plan Enforcement", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Plans table (free/starter/pro/enterprise with limits)", "done": false, "desc": "A database table defining each subscription plan and its limits \u2014 monthly email quota, max contact count, max team members, etc."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Monthly email sent counter per tenant", "done": false, "desc": "A counter that tracks how many emails each tenant has sent in the current billing month \u2014 reset to zero at the start of each month."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Block sends when quota exceeded", "done": false, "desc": "When a tenant reaches their monthly email limit, the 'send campaign' endpoint returns a 429 error and the UI shows a quota-exceeded warning."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Contact count limit enforcement", "done": false, "desc": "Tenants on lower-tier plans are blocked from importing contacts beyond their plan's contact limit."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> 80% quota trigger (notification)", "done": false, "desc": "When a tenant uses 80% of their monthly email quota, an in-app banner appears and a warning email is sent via the Centralized System Emailer."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Worker-triggered email notifications via Centralized System Emailer", "done": false, "desc": "The background worker can send system emails (campaign complete, quota warning, bounce alert) through shrmail.app@gmail.com."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Plan & Usage page (progress bars for emails + contacts vs limit)", "done": false, "desc": "A settings page showing two progress bars: current emails sent vs monthly limit, and current contact count vs plan limit."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Upgrade plan modal (plan comparison table)", "done": false, "desc": "A modal that shows a side-by-side comparison of all plans and a CTA to upgrade \u2014 triggered when users hit plan limits."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> In-app banner when 80% quota reached", "done": false, "desc": "A yellow warning banner shown at the top of the dashboard when the tenant has used 80% of their monthly email quota."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Blocked send page when quota maxed", "done": false, "desc": "A page shown instead of the send button when a tenant has exhausted their monthly send quota."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BILLING]</span> 14-day free trial with Pro limits (no credit card required)", "done": false, "desc": "New tenants get 14 days of Pro plan access without requiring a credit card \u2014 allows full feature evaluation."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BILLING]</span> Overage pricing instead of hard blocking (per-email rate above quota)", "done": false, "desc": "Instead of blocking sends, tenants are billed a per-email rate for emails above their plan quota \u2014 prevents surprise outages."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BILLING]</span> Auto-downgrade to Free tier on subscription lapse (pause, not delete campaigns)", "done": false, "desc": "If a subscription expires, the tenant is downgraded to Free automatically. Existing campaigns and contacts are preserved (paused), not deleted."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BILLING]</span> Grace period on failed payment (7 days, escalating reminder emails)", "done": false, "desc": "When a payment fails, the tenant keeps full access for 7 days while receiving escalating reminder emails to update their payment method."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 10]</span> Wire quota gate to queue_campaign_dispatch() \u2014 check monthly emails_sent vs plan limit before publishing to RabbitMQ (2d)", "done": false, "desc": "Bug fix: campaigns can currently be dispatched even when a tenant is over their plan quota, because the quota check is only in the API layer. Fix: add the quota gate directly inside queue_campaign_dispatch() so no path can bypass it."}]}, {"title": "PHASE 7.5 \u2014 Infrastructure & DevOps", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> Docker (Dockerfiles for API, worker, client)", "done": true, "desc": "Dockerfile for each service (FastAPI backend, Python workers, Next.js frontend) so the entire stack runs in containers on any machine."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> docker-compose.yml", "done": true, "desc": "A single file that defines and starts all services together (API, worker, frontend, RabbitMQ, Redis, Nginx) with one command."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> Nginx config", "done": true, "desc": "The Nginx reverse proxy configuration that routes /api requests to the FastAPI backend and all other requests to the Next.js frontend."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> SSL/HTTPS (Let's Encrypt guide in docs)", "done": false, "desc": "Documentation and a script for obtaining a free SSL certificate from Let's Encrypt and configuring Nginx to serve the app over HTTPS."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> CI/CD pipeline (GitHub Actions)", "done": false, "desc": "A GitHub Actions workflow that automatically lints, tests, builds Docker images, and deploys to the server on every merge to the main branch."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> Load & Spam Testing Setup (k6 + Mail-Tester integration)", "done": false, "desc": "k6 scripts for load-testing the API under heavy campaign traffic, plus Mail-Tester integration to validate spam scores before sending."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> Security Headers & Content Security Policy for all pages", "done": false, "desc": "HTTP security headers (Content-Security-Policy, X-Frame-Options, Strict-Transport-Securit
