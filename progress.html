y) added to all responses to prevent common web attacks."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> API Rate Limiting (per-tenant, per-endpoint, burst protection)", "done": false, "desc": "API-level rate limiting that restricts how many calls a specific tenant can make per minute per endpoint \u2014 uses Redis as the counter store."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> Background Job Status Table (CSV import, GDPR export, campaign send)", "done": false, "desc": "A database table tracking all long-running background jobs (imports, exports, sends) so the UI can show real-time progress without polling the queue."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> Worker concurrency safety (locked_by column to prevent zombie tasks)", "done": false, "desc": "A locked_by column on job rows prevents two worker replicas from processing the same job simultaneously."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[DEVOPS]</span> Idempotency guard (external_msg_id to prevent double-sends on retry)", "done": false, "desc": "Each email send attempt is tagged with a unique external_msg_id. If the worker retries after a crash, it skips emails that were already successfully sent."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[HEALTH CHECKS]</span> GET /health on FastAPI (db + worker status)", "done": false, "desc": "A health-check endpoint that returns whether the database and RabbitMQ connections are alive \u2014 used by load balancers and monitoring tools."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[HEALTH CHECKS]</span> GET /health on Worker (queue depth, last processed)", "done": false, "desc": "The email worker exposes a lightweight HTTP health endpoint showing how many messages are in the queue and when the last one was processed."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[OBSERVABILITY]</span> Centralized structured logging (ELK stack or Grafana Loki)", "done": false, "desc": "All logs (API, workers, Nginx) are shipped to a central log aggregator for searching, filtering, and alerting on errors."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[OBSERVABILITY]</span> Sentry error tracking on FastAPI + Next.js frontend", "done": false, "desc": "Sentry is integrated on both the backend and frontend \u2014 uncaught exceptions are automatically reported with stack traces for fast debugging."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[OBSERVABILITY]</span> Database backup strategy (daily, 30-day retention, monthly restore drill)", "done": false, "desc": "Automated daily Supabase database backups with 30-day retention. Once a month, a restore drill verifies backups are actually recoverable."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 11]</span> Uncomment Nginx block in docker-compose.yml; close ports 8000 and 3000 from public network (0.5d)", "done": false, "desc": "Security fix: the Nginx service is commented out in docker-compose.yml, meaning the API (port 8000) and frontend (port 3000) are directly exposed to the internet. Fix: enable Nginx as the reverse proxy and remove the raw port exposures."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 12]</span> GitHub Actions CI/CD pipeline \u2014 lint + test + Docker build + deploy on merge to main (2d)", "done": false, "desc": "Automation fix: deployments are currently manual. Fix: create a GitHub Actions workflow that runs linting, test suite, builds Docker images, and deploys to the server on every merge to main."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 13]</span> git rm frnds_contacts.csv, testmail_contacts.csv, platform/api/app.db; add *.csv and *.db to .gitignore; purge from git history (0.5d)", "done": false, "desc": "Security fix: real contact CSV files and an SQLite database artifact were committed to the Git repository. Fix: remove them, add patterns to .gitignore, and purge them from the entire Git history using git filter-repo."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRIEND AUDIT FIX 21]</span> Dynamic Config Loading \u2014 Replace Path(__file__) .env loading with robust config.py / pydantic-settings (0.5d)", "done": false, "desc": "Reliability fix: the app loads .env using a path relative to the script file, which breaks if the script is run from a different directory. Fix: use pydantic-settings which reads from environment variables properly and validates all required config at startup."}]}, {"title": "PHASE 7.6 \u2014 Code Quality & Hygiene [ADDED FROM AUDIT]", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 14]</span> Automated test suite \u2014 20 priority tests: auth signup/login, _suppress_contact tenant isolation, unsub token roundtrip, dispatch contact count, quota gate, bounce classification (4d)", "done": false, "desc": "The tests/ directory has no actual test files \u2014 silent regressions can ship undetected. Fix: write 20 priority tests covering the most critical paths: auth endpoints, cross-tenant suppression isolation, unsubscribe token round-trips, quota enforcement, and bounce classification."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 15]</span> Migration file renumbering \u2014 resolve duplicate 012_* and 013_* filenames for safe fresh deployment (0.5d)", "done": false, "desc": "Bug fix: two migration files share the same number prefix (012_* and 013_*). On a fresh database deployment, they run in unpredictable order, creating a broken schema. Fix: renumber them to ensure every migration file has a unique sequential number."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[AUDIT FIX 16]</span> Remove dead Clerk config \u2014 delete CLERK_SECRET_KEY and CLERK_PUBLISHABLE_KEY from docker-compose.yml and .env.example (0.5d)", "done": false, "desc": "Cleanup: the project previously used Clerk for auth before switching to a custom JWT model. Clerk API key references still exist in docker-compose.yml and .env.example, confusing new developers. Fix: remove all Clerk references."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRIEND AUDIT FIX 22]</span> Repository Pattern / DAL \u2014 Abstract direct Supabase queries out of controllers into services/db.py (4d)", "done": false, "desc": "Refactoring: route handlers directly contain Supabase SQL queries like db.client.table('campaigns').select(). This makes routes hard to test and tightly coupled to the database library. Fix: extract all DB interactions into a Data Access Layer (services/db.py) that route handlers call instead."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRIEND AUDIT FIX 23]</span> Monolithic Worker Refactor \u2014 Split email_sender.py into modular layers (parsing, sending, injection, logging) (2d)", "done": false, "desc": "Refactoring: email_sender.py handles everything in one massive try/except block \u2014 message parsing, circuit breaking, unsubscribe link injection, SMTP sending, and DB updates. Fix: split into focused modules (message_parser.py, smtp_sender.py, tracking_injector.py, dispatch_logger.py)."}]}, {"title": "PHASE 8 \u2014 Account Settings & Administration", "tasks": [{"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SETTINGS CORE]</span> Settings landing page (/settings) with navigation cards", "done": true, "desc": "A hub page at /settings with cards linking to each settings sub-section: Profile, Team, Sender Domains, API Keys, Billing."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SETTINGS CORE]</span> Profile page (edit name, timezone)", "done": true, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SETTINGS CORE]</span> Organization page (company name, CAN-SPAM physical address)", "done": true, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SETTINGS CORE]</span> Team Management \u2014 invite users to workspace", "done": false, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[INVITATION ARCH]</span> Per-member isolation_model (team/agency) on tenant_users \u2014 migration 024", "done": true, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[INVITATION ARCH]</span> isolation_model on team_invitations, set at invite time \u2014 migration 024", "done": true, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY & COMPLIANCE]</span> GDPR Right-to-Erase (anonymize contact PII)", "done": true, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY & COMPLIANCE]</span> Data Export button (CSV export of all contacts)", "done": true, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY & COMPLIANCE]</span> Compliance checklist page (/settings/compliance)", "done": true, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY & COMPLIANCE]</span> Multi-Factor Authentication (MFA via TOTP)", "done": false, "desc": " tacts, template, campaign, delivery, analytics, notification services", "done": false, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[MICROSERVICES]</span> API Gateway (Nginx/Kong) \u2014 single entry point routing", "done": false, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[MICROSERVICES]</span> Each service in its own Docker container", "done": false, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[MICROSERVICES]</span> Services communicate via REST or RabbitMQ/Kafka", "done": false, "desc": ""}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Custom domain setup wizard (enter domain > get DNS records > verify)", "done": false, "desc": "A step-by-step wizard where tenants enter their sending domain, get SPF/DKIM/DMARC DNS records to add, and then the platform verifies them automatically."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> IP warmup status page (daily send limit and progression)", "done": false, "desc": "A page showing where the tenant's sending domain is in the 30-day warm-up schedule \u2014 today's allowed send volume and the projected progression."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Platform health dashboard (Redis queue depth, worker status)", "done": false, "desc": "An internal admin dashboard showing real-time platform metrics: RabbitMQ queue depth, worker processing rate, Redis memory usage, and Supabase connection status."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SCALE]</span> Horizontal worker scaling (stateless workers, Docker Swarm / k8s replicas)", "done": false, "desc": "The email worker is refactored to be fully stateless so multiple replicas can run in parallel \u2014 enabling horizontal scaling to handle high-volume campaign blasts."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SCALE]</span> Circuit breaker on SES SMTP (fail fast on consecutive failures, auto-reset)", "done": false, "desc": "If the SMTP connection to SES fails 5 times in a row, the circuit breaker opens and the worker stops trying immediately \u2014 preventing pile-up of failed jobs. It auto-resets after 60 seconds."}, {"text": "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SCALE]</span> Cost monitoring dashboard (per-tenant SES cost vs plan revenue)", "done": false, "desc": "An internal admin dashboard showing, per tenant, how much is being spent on AWS SES API calls vs the revenue from their current subscription plan."}]}];
        const savedState = JSON.parse(localStorage.getItem('shrmail_phases_tracker') || '{}');
        let totalTasks = 0;
        let completedTasks = 0;

        const container = document.getElementById('phases-container');
        
        function updateMasterStats() {
            document.getElementById('master-completed').textContent = completedTasks;
            document.getElementById('master-total').textContent = totalTasks;
            document.getElementById('master-percent').textContent = 
                totalTasks > 0 ? Math.round((completedTasks/totalTasks)*100) : 0;
        }

        phasesData.forEach((phase, pIndex) => {
            if (phase.tasks.length === 0) return;
            
            const pCard = document.createElement('div');
            pCard.className = 'glass rounded-2xl p-6 shadow-xl transition-all duration-300 hover:border-indigo-500/30';
            
            let phaseCompleted = 0;
            
            const taskHeader = document.createElement('div');
            taskHeader.className = 'flex flex-col sm:flex-row justify-between sm:items-center mb-5 border-b border-zinc-800 pb-4 gap-2';
            taskHeader.innerHTML = `<h2 class="text-xl sm:text-2xl font-bold text-white flex items-center gap-2">
                                        <div class="w-2 h-8 bg-gradient-to-b from-indigo-500 to-purple-500 rounded-full"></div>
                                        ${phase.title}
                                    </h2>
                                    <span class="text-xs font-mono px-3 py-1.5 rounded-lg border border-zinc-700/50 text-zinc-300 bg-zinc-800" id="stat-${pIndex}"></span>`;
            pCard.appendChild(taskHeader);
            
            const taskList = document.createElement('div');
            taskList.className = 'space-y-2';
            
            phase.tasks.forEach((task, tIndex) => {
                totalTasks++;
                const taskId = `task-${pIndex}-${tIndex}`;
                let isChecked = savedState[taskId] !== undefined ? savedState[taskId] : task.done;
                if (isChecked) { completedTasks++; phaseCompleted++; }
                
                const tDiv = document.createElement('div');
                tDiv.className = 'flex items-start gap-4 p-3 rounded-xl hover:bg-zinc-800/50 transition-colors group';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = taskId;
                checkbox.checked = isChecked;
                checkbox.className = 'mt-1 w-5 h-5 text-indigo-500 bg-zinc-900 border-zinc-700 rounded-md focus:ring-indigo-500 focus:ring-2 focus:ring-offset-2 focus:ring-offset-zinc-900 cursor-pointer transition-all';
                
                checkbox.addEventListener('change', (e) => {
                    savedState[taskId] = e.target.checked;
                    localStorage.setItem('shrmail_phases_tracker', JSON.stringify(savedState));
                    
                    if(e.target.checked) { completedTasks++; phaseCompleted++; } 
                    else { completedTasks--; phaseCompleted--; }
                    
                    updateMasterStats();
                    document.getElementById(`stat-${pIndex}`).textContent = `${phaseCompleted} / ${phase.tasks.length} DONE`;
                    label.classList.toggle('line-through', e.target.checked);
                    label.classList.toggle('text-zinc-500', e.target.checked);
                    label.classList.toggle('text-zinc-200', !e.target.checked);
                    if (descEl) {
                        descEl.classList.toggle('text-zinc-600', e.target.checked);
                        descEl.classList.toggle('text-zinc-500', !e.target.checked);
                    }
                });
                
                let descEl = null;
                
                const label = document.createElement('label');
                label.htmlFor = taskId;
                label.className = `text-sm leading-relaxed cursor-pointer select-none block w-full transition-all duration-200 ${isChecked ? 'line-through text-zinc-500' : 'text-zinc-200'}`;
                label.innerHTML = task.text;
                
                const labelWrap = document.createElement('div');
                labelWrap.className = 'flex-1 min-w-0';
                labelWrap.appendChild(label);

                if (task.desc) {
                    const desc = document.createElement('p');
                    desc.className = `task-desc ${isChecked ? 'text-zinc-600' : 'text-zinc-500'}`;
                    desc.textContent = task.desc;
                    descEl = desc;
                    labelWrap.appendChild(desc);
                }

                tDiv.appendChild(checkbox);
                tDiv.appendChild(labelWrap);
                taskList.appendChild(tDiv);
            });
            
            pCard.appendChild(taskList);
            container.appendChild(pCard);
            document.getElementById(`stat-${pIndex}`).textContent = `${phaseCompleted} / ${phase.tasks.length} DONE`;
        });
        
        updateMasterStats();
    </script>
