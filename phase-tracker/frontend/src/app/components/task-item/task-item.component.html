<div class="group flex items-center py-2 px-3 hover:bg-gray-700/50 rounded-lg transition-colors border border-transparent hover:border-gray-600/50">
  
  <!-- Checkbox -->
  <div class="flex-shrink-0 mr-3 mt-0.5">
    <div 
      (click)="toggleDone()"
      class="w-5 h-5 rounded border border-gray-500 flex items-center justify-center cursor-pointer transition-colors"
      [ngClass]="{'bg-indigo-500 border-indigo-500': task.done, 'hover:border-indigo-400': !task.done}">
      <svg *ngIf="task.done" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
  </div>

  <!-- View Mode -->
  <div *ngIf="!isEditing" class="flex-grow min-w-0 pr-2">
    <p 
      class="text-sm font-medium whitespace-pre-wrap break-words transition-colors duration-200"
      [ngClass]="{'text-gray-400 line-through': task.done, 'text-gray-200': !task.done}"
      [innerHTML]="task.text">
    </p>
  </div>

  <!-- Edit Mode -->
  <div *ngIf="isEditing" class="flex-grow flex items-center pr-2">
    <input 
      type="text" 
      [(ngModel)]="editText" 
      (keyup.enter)="saveEdit()"
      (keyup.escape)="cancelEdit()"
      class="w-full bg-gray-900 border border-indigo-500 rounded px-2 py-1 text-sm text-white focus:outline-none"
      autoFocus
    >
  </div>

  <!-- Actions (visible on hover) -->
  <div class="flex-shrink-0 flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity" *ngIf="!isEditing">
    <button (click)="startEdit()" class="p-1 text-gray-400 hover:text-indigo-400 rounded transition-colors" title="Edit Task">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
    </button>
    <button (click)="deleteTask()" class="p-1 text-gray-400 hover:text-red-400 rounded transition-colors" title="Delete Task">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>

  <div class="flex-shrink-0 flex items-center space-x-1" *ngIf="isEditing">
    <button (click)="saveEdit()" class="p-1 text-green-400 hover:text-green-300 rounded">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </button>
    <button (click)="cancelEdit()" class="p-1 text-red-400 hover:text-red-300 rounded">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
</div>
