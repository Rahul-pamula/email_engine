        };

        phasesData[1] = {
            title: "PHASE 1 — Foundation, Auth, Tenant Identity, and Onboarding (Verified Audit)",
            tasks: [
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Custom email/password authentication exists", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Passwords are hashed with <code>bcrypt</code>", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> JWT creation and verification exist", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Tenant membership model exists through <code>users</code>, <code>tenants</code>, and <code>tenant_users</code>", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Onboarding routes exist", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Active-tenant guard exists", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Workspace switching exists", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> Supabase Auth is the active authentication system", done: false },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> RLS is the active tenant-isolation layer", done: false },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> <code>/auth/me</code> is fully implemented", done: false },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[BACKEND]</span> All onboarding endpoints use JWT-only tenant resolution consistently", done: false },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Login page exists", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Signup page exists", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Onboarding wizard exists", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Dashboard onboarding checklist exists", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Sidebar navigation layout exists", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Auth context exists", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Middleware redirects exist", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[FRONTEND]</span> Route protection is fully centralized and consistent", done: false },

                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY MODEL]</span> <code>X-Tenant-ID</code> is validated against JWT when used", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY MODEL]</span> Onboarding tenants are blocked from active-tenant routes", done: true },
                { text: "<span class='text-xs font-bold text-indigo-400 mr-2 uppercase block sm:inline'>[SECURITY MODEL]</span> Database-level RLS is the active protection mechanism", done: false }
            ]
        };

        // Load overrides from localStorage
        const savedState = JSON.parse(localStorage.getItem('shrmail_phases_tracker') || '{}');
        let totalTasks = 0;
        let completedTasks = 0;

        const container = document.getElementById('phases-container');
        
        function updateMasterStats() {
            document.getElementById('master-completed').textContent = completedTasks;
            document.getElementById('master-total').textContent = totalTasks;
            document.getElementById('master-percent').textContent = 
                totalTasks > 0 ? Math.round((completedTasks/totalTasks)*100) : 0;
        }

        phasesData.forEach((phase, pIndex) => {
            if (phase.tasks.length === 0) return;
            
            const pCard = document.createElement('div');
            pCard.className = 'glass rounded-2xl p-6 shadow-xl transition-all duration-300 hover:border-indigo-500/30';
            
            let phaseCompleted = 0;
            
            const taskHeader = document.createElement('div');
            taskHeader.className = 'flex flex-col sm:flex-row justify-between sm:items-center mb-5 border-b border-zinc-800 pb-4 gap-2';
            const progressHue = phase.title.includes('DONE') ? 'text-emerald-400 bg-emerald-400/10' : 'text-zinc-300 bg-zinc-800';
            taskHeader.innerHTML = `<h2 class="text-xl sm:text-2xl font-bold text-white flex items-center gap-2">
                                        <div class="w-2 h-8 bg-gradient-to-b from-indigo-500 to-purple-500 rounded-full"></div>
                                        ${phase.title}
                                    </h2>
                                    <span class="text-xs font-mono px-3 py-1.5 rounded-lg border border-zinc-700/50 ${progressHue}" id="stat-${pIndex}"></span>`;
            pCard.appendChild(taskHeader);
            
            const taskList = document.createElement('div');
            taskList.className = 'space-y-2';
            
            phase.tasks.forEach((task, tIndex) => {
                totalTasks++;
                const taskId = `task-${pIndex}-${tIndex}`;
                // Determine truth from localStorage first, fallback to markdown state
                let isChecked = savedState[taskId] !== undefined ? savedState[taskId] : task.done;
                if (isChecked) { completedTasks++; phaseCompleted++; }
                
                const tDiv = document.createElement('div');
                tDiv.className = 'flex items-start gap-4 p-3 rounded-xl hover:bg-zinc-800/50 transition-colors group';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = taskId;
                checkbox.checked = isChecked;
                checkbox.className = 'mt-1 w-5 h-5 text-indigo-500 bg-zinc-900 border-zinc-700 rounded-md focus:ring-indigo-500 focus:ring-2 focus:ring-offset-2 focus:ring-offset-zinc-900 cursor-pointer transition-all';
                
                checkbox.addEventListener('change', (e) => {
                    savedState[taskId] = e.target.checked;
                    localStorage.setItem('shrmail_phases_tracker', JSON.stringify(savedState));
                    
                    if(e.target.checked) { completedTasks++; phaseCompleted++; } 
                    else { completedTasks--; phaseCompleted--; }
                    
                    updateMasterStats();
                    document.getElementById(`stat-${pIndex}`).textContent = `${phaseCompleted} / ${phase.tasks.length} DONE`;
                    label.classList.toggle('line-through', e.target.checked);
                    label.classList.toggle('text-zinc-500', e.target.checked);
                    label.classList.toggle('text-zinc-200', !e.target.checked);
                });
                
                const label = document.createElement('label');
                label.htmlFor = taskId;
                label.className = `text-sm leading-relaxed cursor-pointer select-none block w-full transition-all duration-200 ${isChecked ? 'line-through text-zinc-500' : 'text-zinc-200'}`;
                label.innerHTML = task.text;
                
                tDiv.appendChild(checkbox);
                tDiv.appendChild(label);
                taskList.appendChild(tDiv);
            });
            
            pCard.appendChild(taskList);
            container.appendChild(pCard);
            
            // Initial Phase Stat
            document.getElementById(`stat-${pIndex}`).textContent = `${phaseCompleted} / ${phase.tasks.length} DONE`;
        });
        
        updateMasterStats();
    </script>
